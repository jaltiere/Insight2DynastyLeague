# Nixpacks configuration for Railway
# This tells Nixpacks how to build and run the Python backend

[phases.setup]
nixPkgs = ["python311", "gcc", "libmysqlclient"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt"
]

# Note: Migrations should be run manually via Railway Shell after deployment
# Run: railway shell -> cd backend -> alembic upgrade head

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend"
