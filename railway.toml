# Railway configuration for Insight2Dynasty League
# Docs: https://docs.railway.app/deploy/config-as-code

[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 100

# Environment variables (set in Railway dashboard)
# Required:
# - DATABASE_URL (auto-populated by Railway MySQL plugin)
# - SLEEPER_LEAGUE_ID
# - CORS_ORIGINS (comma-separated list including your Railway frontend URL)
# - CRON_SECRET (for scheduled sync endpoint security)

# Recommended:
# - DEBUG=False
# - APP_VERSION=1.0.0
